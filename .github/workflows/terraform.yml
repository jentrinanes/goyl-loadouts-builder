name: Terraform Infrastructure

on:
  push:
    branches:
      - master
      - staging
    paths:
      - 'infrastructure/**'
  pull_request:
    branches:
      - master
      - staging
    paths:
      - 'infrastructure/**'
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infrastructure

    env:
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      ARM_ACCESS_KEY:      ${{ secrets.ARM_ACCESS_KEY }}
      TF_ENV:              ${{ github.ref_name == 'staging' && 'staging' || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.5'

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ env.TF_ENV }}.terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="environment=${{ env.TF_ENV }}" -var="hmac_secret=${{ secrets.HMAC_SECRET }}" -out=tfplan

      - name: Terraform Apply
        if: github.event_name != 'pull_request'
        run: terraform apply -auto-approve tfplan
