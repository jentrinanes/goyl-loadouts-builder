name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Type Check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build frontend
        run: |
          npm install
          npm run build

      - name: Type check frontend
        run: npx tsc --noEmit

      - name: Install and build API
        run: |
          cd api
          npm install
          npm run build
